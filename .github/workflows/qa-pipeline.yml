name: Lite Thinking QA TestOps Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  run-automation-suite:
    name: Ejecución de Pruebas y Reporte
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Semana_3/dia-4-kafka-docker

    steps:
      - name: 1. Descargar Código del Repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar Entorno Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 3. Levantar Infraestructura de Kafka (Docker)
        run: |
          docker compose up -d
          echo "Esperando que Kafka-Broker esté listo..."
          timeout 120 bash -c 'until docker compose exec -T kafka /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --list >/dev/null 2>&1; do sleep 2; done'

      - name: 4. Instalar Dependencias de la Aplicación
        run: |
          cd backend
          npm ci

      - name: 5. Instalar Dependencias de Pruebas (Playwright)
        run: |
          cd tests
          npm ci
          npm run install:browsers:ci

      - name: 6. Lanzar Aplicación y Consumidor en Segundo Plano
        run: |
          cd backend
          npm run start-server > server.log 2>&1 &
          npm run start-worker > worker.log 2>&1 &
          echo "Esperando endpoint de salud del backend..."
          timeout 120 bash -c 'until curl -fsS http://localhost:3000/health >/dev/null; do sleep 2; done'

      - name: 7. Ejecutar pruebas Playwright
        run: |
          cd tests
          npm run test

